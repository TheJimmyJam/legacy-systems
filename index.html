<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>

<style>
  :root {
    --bg:        #0a0e0a;
    --bg-panel:  #11161180;
    --panel:     #0f140f;
    --border:    #1f2a1f;
    --border-hot:#2c3a2c;
    --green:     #39d353;  /* phosphor green */
    --amber:     #d29922;  /* phosphor amber */
    --red:       #f85149;
    --blue:      #58a6ff;
    --text:      #c9d6c9;
    --text-dim:  #6b7d6b;
    --mono: "SFMono-Regular", "Roboto Mono", Menlo, Consolas, monospace;
    --display: "Arial Black", "Helvetica Neue", Impact, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; }
  body {
    background:
      radial-gradient(ellipse at 50% -10%, #12201280 0%, transparent 60%),
      repeating-linear-gradient(0deg, #0000 0 2px, #00000022 2px 3px),
      var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
  }
  a { color: var(--green); }
  ::selection { background: var(--green); color: #000; }

  .scanline { position: fixed; inset: 0; pointer-events:none; z-index:9999;
    background: repeating-linear-gradient(0deg, #0000 0 3px, #00000018 3px 4px); }

  /* ---------- shell ---------- */
  .topbar { display:flex; align-items:center; justify-content:space-between;
    padding: 12px 22px; border-bottom: 1px solid var(--border-hot);
    background: linear-gradient(#0d120d, #0a0e0a); position:sticky; top:0; z-index:50; }
  .brand { display:flex; align-items:baseline; gap:12px; }
  .brand h1 { font-family: var(--display); letter-spacing:2px; font-size:18px;
    margin:0; color:#eafaea; text-transform:uppercase;
    text-shadow: 0 0 8px #39d35355; }
  .brand .sub { color: var(--amber); font-size:11px; letter-spacing:3px; text-transform:uppercase; }
  .who { font-size:11px; color: var(--text-dim); display:flex; gap:14px; align-items:center; }
  .who button { background:none; border:1px solid var(--border-hot); color:var(--text-dim);
    font-family:var(--mono); font-size:10px; padding:4px 8px; cursor:pointer; letter-spacing:1px; }
  .who button:hover { color: var(--green); border-color: var(--green); }
  .btn-export { border-color: var(--amber) !important; color: var(--amber) !important; }
  .btn-export:hover { background: var(--amber) !important; color: var(--bg) !important; border-color: var(--amber) !important; }

  .nav { display:flex; gap:2px; padding: 0 16px; border-bottom:1px solid var(--border);
    background:#0c100c; overflow-x:auto; }
  .nav button { background:none; border:none; border-bottom:2px solid transparent;
    color: var(--text-dim); font-family: var(--mono); font-size:12px; letter-spacing:1px;
    padding: 12px 16px; cursor:pointer; text-transform:uppercase; white-space:nowrap; }
  .nav button:hover { color: var(--text); }
  .nav button.active { color: var(--green); border-bottom-color: var(--green);
    text-shadow:0 0 6px #39d35355; }
  .nav button.soon { color:#3a473a; cursor:default; }
  .nav button.soon:hover { color:#3a473a; }

  .wrap { max-width: 1180px; margin: 0 auto; padding: 28px 22px 80px; }

  .panel { border:1px solid var(--border-hot); background: var(--panel);
    padding: 20px 22px; margin-bottom: 18px; }
  .panel h2 { font-family:var(--display); letter-spacing:1px; font-size:14px;
    text-transform:uppercase; color:#dff0df; margin:0 0 14px; border-bottom:1px solid var(--border);
    padding-bottom:8px; }
  .label { color: var(--amber); font-size:10px; letter-spacing:2px; text-transform:uppercase; }
  .dim { color: var(--text-dim); }

  /* ---------- login ---------- */
  .login-shell { min-height: 100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
  .login-box { width:100%; max-width: 420px; border:1px solid var(--border-hot); background:var(--panel);
    padding: 34px 30px; box-shadow: 0 0 60px #39d35311; }
  .login-box h1 { font-family:var(--display); letter-spacing:3px; font-size:24px; margin:0 0 4px;
    color:#eafaea; text-transform:uppercase; text-shadow:0 0 12px #39d35344; }
  .login-box .tag { color:var(--amber); font-size:11px; letter-spacing:4px; text-transform:uppercase; margin-bottom:26px; }
  input[type=email], input[type=text], textarea, select {
    width:100%; background:#070a07; border:1px solid var(--border-hot); color:var(--text);
    font-family:var(--mono); font-size:13px; padding:10px 12px; outline:none; }
  input:focus, textarea:focus, select:focus { border-color: var(--green); box-shadow:0 0 0 1px #39d35355; }
  textarea { resize:vertical; line-height:1.6; }
  .btn { background:#0d160d; border:1px solid var(--green); color:var(--green);
    font-family:var(--mono); font-size:12px; letter-spacing:2px; text-transform:uppercase;
    padding:11px 18px; cursor:pointer; width:100%; margin-top:14px; transition:.15s; }
  .btn:hover { background: var(--green); color:#000; }
  .btn:disabled { opacity:.4; cursor:default; }
  .btn.sm { width:auto; padding:6px 12px; font-size:10px; margin-top:0; }
  .msg { margin-top:16px; font-size:12px; padding:10px 12px; border-left:2px solid var(--green); background:#0d160d; }
  .msg.err { border-left-color: var(--red); color:#ffb3ad; background:#1a0d0d; }

  /* ---------- pin pad ---------- */
  .pin-dots { display:flex; gap:16px; justify-content:center; margin:6px 0 22px; }
  .pin-dot { width:14px; height:14px; border-radius:50%; border:1px solid var(--border-hot);
    background:#070a07; transition:.12s; }
  .pin-dot.on { background:var(--green); border-color:var(--green); box-shadow:0 0 10px var(--green); }
  .pinpad { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
  .pinkey { background:#0c110c; border:1px solid var(--border-hot); color:#dff0df;
    font-family:var(--mono); font-size:22px; padding:16px 0; cursor:pointer; transition:.1s; }
  .pinkey:hover:not(:disabled) { border-color:var(--green); color:var(--green); box-shadow:0 0 0 1px #39d35333; }
  .pinkey:active:not(:disabled) { background:var(--green); color:#000; }
  .pinkey.ghost { color:var(--text-dim); font-size:18px; }
  .pinkey:disabled { opacity:.4; cursor:default; }

  /* ---------- overview ---------- */
  .grid2 { display:grid; grid-template-columns: 1fr 1fr; gap:16px; }
  .stat-row { display:grid; grid-template-columns: repeat(auto-fit, minmax(120px,1fr)); gap:10px; }
  .stat { border:1px solid var(--border-hot); background:#0c110c; padding:12px 14px; }
  .stat .n { font-size:26px; font-family:var(--display); color:var(--green); text-shadow:0 0 8px #39d35344; }
  .stat .k { font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--text-dim); }
  .logline { font-size:16px; line-height:1.7; color:#e6f2e6; border-left:3px solid var(--amber); padding-left:16px; }
  .kv { display:grid; grid-template-columns: 130px 1fr; gap:6px 14px; font-size:13px; }
  .kv dt { color:var(--amber); font-size:10px; letter-spacing:1px; text-transform:uppercase; padding-top:3px; }
  .kv dd { margin:0; }
  .clock-row { display:flex; align-items:center; gap:12px; padding:8px 0; border-bottom:1px solid var(--border); }
  .lamp { width:11px; height:11px; border-radius:50%; flex:none; }
  .lamp.green { background:var(--green); box-shadow:0 0 8px var(--green); }
  .lamp.amber { background:var(--amber); box-shadow:0 0 8px var(--amber); }
  .lamp.red   { background:var(--red);   box-shadow:0 0 10px var(--red); animation:blink 1.2s infinite; }
  @keyframes blink { 50% { opacity:.35; } }

  /* ---------- characters ---------- */
  .faction-head { display:flex; align-items:center; gap:10px; margin: 26px 0 12px; }
  .faction-head .bar { width:4px; height:20px; }
  .faction-head h3 { font-family:var(--display); letter-spacing:1px; text-transform:uppercase;
    font-size:13px; margin:0; }
  .faction-head .ct { color:var(--text-dim); font-size:11px; }
  .card-grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(230px,1fr)); gap:12px; }
  .char-card { border:1px solid var(--border-hot); background:#0c110c; padding:14px; cursor:pointer;
    transition:.12s; position:relative; }
  .char-card:hover { border-color: var(--green); box-shadow:0 0 0 1px #39d35333, 0 0 24px #39d35311; }
  .char-card .nm { font-family:var(--display); font-size:15px; color:#eafaea; letter-spacing:.5px; }
  .char-card .fn { font-size:11px; color:var(--text-dim); }
  .char-card .dom { font-size:11px; color:var(--amber); margin-top:8px; letter-spacing:.5px; }
  .char-card .age { position:absolute; top:12px; right:14px; font-size:11px; color:var(--text-dim); }
  .pill { display:inline-block; font-size:9px; letter-spacing:1px; text-transform:uppercase;
    padding:2px 7px; border:1px solid var(--border-hot); color:var(--text-dim); margin-top:10px; }

  /* ---------- scenes ---------- */
  .scenes-wrap { display:grid; grid-template-columns: 270px 1fr; gap:16px; align-items:start; }
  .scene-rail { border:1px solid var(--border-hot); background:var(--panel); padding:14px; position:sticky; top:96px; max-height:calc(100vh - 120px); overflow-y:auto; }
  .rail-act { color:var(--amber); font-size:10px; letter-spacing:2px; text-transform:uppercase; margin:0 0 7px; }
  .scene-pill { display:flex; align-items:center; gap:8px; padding:9px 10px; border:1px solid var(--border);
    background:#0c110c; margin-bottom:6px; cursor:pointer; transition:.1s; }
  .scene-pill:hover { border-color:var(--border-hot); }
  .scene-pill.active { border-color:var(--green); box-shadow:0 0 0 1px #39d35333; }
  .scene-pill-t { flex:1; font-size:12px; color:#dff0df; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .scene-pill-s { font-size:9px; color:var(--text-dim); text-transform:uppercase; letter-spacing:1px; }
  .sdot { width:8px; height:8px; border-radius:50%; flex:none; background:var(--text-dim); }
  .sdot.idea{background:#4a5a4a;} .sdot.outlined{background:var(--amber);}
  .sdot.drafted{background:var(--blue);} .sdot.done{background:var(--green);box-shadow:0 0 7px var(--green);}

  .scene-editor { border:1px solid var(--border-hot); background:var(--panel); padding:18px 20px; min-height:60vh; }
  .editor-bar { display:flex; gap:12px; align-items:center; margin-bottom:12px; }
  .scene-title { flex:1; background:transparent; border:none; border-bottom:1px solid var(--border-hot);
    color:#eafaea; font-family:var(--display); font-size:18px; letter-spacing:.5px; padding:6px 2px; }
  .scene-title:focus { border-bottom-color:var(--green); box-shadow:none; }
  .editor-bar-right { display:flex; gap:8px; }
  .editor-bar-right select { width:auto; padding:7px 10px; font-size:11px; }
  .char-tags { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:14px; }
  .ctag { background:#0c110c; border:1px solid var(--border-hot); color:var(--text-dim);
    font-family:var(--mono); font-size:10px; letter-spacing:1px; text-transform:uppercase;
    padding:4px 9px; cursor:pointer; transition:.1s; }
  .ctag:hover { color:var(--text); }
  .ctag.on { color:#000; background:var(--green); border-color:var(--green); }
  .script-area { width:100%; min-height:46vh; background:#070a07; border:1px solid var(--border-hot);
    color:var(--text); font-family:var(--mono); font-size:14px; line-height:1.8; padding:16px 18px;
    resize:vertical; white-space:pre-wrap; }
  .editor-foot { display:flex; align-items:center; gap:16px; margin-top:14px; flex-wrap:wrap; }
  .del-btn { margin-left:auto; background:none; border:1px solid var(--border-hot); color:var(--text-dim);
    font-family:var(--mono); font-size:10px; letter-spacing:1px; text-transform:uppercase; padding:7px 12px; cursor:pointer; }
  .del-btn:hover { color:var(--red); border-color:var(--red); }
  @media (max-width:760px){ .scenes-wrap{ grid-template-columns:1fr; } .scene-rail{ position:static; max-height:none; } }

  /* ---------- script: export / preview / help ---------- */
  .export-bar { display:flex; align-items:center; gap:10px; flex-wrap:wrap; border:1px solid var(--border-hot);
    background:var(--panel); padding:12px 16px; margin-bottom:16px; }
  .sp-toolbar { display:flex; gap:8px; margin-bottom:12px; align-items:center; }
  .toggle { background:#0c110c; border:1px solid var(--border-hot); color:var(--text-dim);
    font-family:var(--mono); font-size:11px; letter-spacing:1px; text-transform:uppercase; padding:6px 12px; cursor:pointer; }
  .toggle:hover { color:var(--text); }
  .toggle.on { color:#000; background:var(--green); border-color:var(--green); }
  .fountain-help { border-left:2px solid var(--amber); background:#0d130d; padding:12px 16px; margin-bottom:14px; font-size:12px; line-height:1.7; }
  .fountain-help ul { margin:8px 0; padding-left:18px; }
  .fountain-help li { margin:3px 0; }
  .fountain-help code { background:#1a221a; color:var(--green); padding:1px 5px; font-size:11px; }
  .screenplay { font-family:"Courier New",Courier,monospace; background:var(--panel);
    border:1px solid var(--border-hot); color:var(--text); padding:26px 34px; line-height:1.5;
    min-height:46vh; max-width:660px; }
  .screenplay p { margin:0; white-space:pre-wrap; }
  .sp-scene { font-weight:bold; text-transform:uppercase; margin:16px 0 8px !important; }
  .sp-action { margin:0 0 10px !important; }
  .sp-char { margin:10px 0 0 38% !important; text-transform:uppercase; }
  .sp-paren { margin:0 0 0 30% !important; }
  .sp-dia { margin:0 16% 0 18% !important; }
  .sp-trans { text-align:right; text-transform:uppercase; margin:10px 0 !important; }
  .sp-center { text-align:center; }

  /* ---------- photo drop ---------- */
  .dropzone { border:1px dashed var(--border-hot); background:#0a0f0a; padding:26px 16px;
    text-align:center; cursor:pointer; font-size:12px; color:var(--text-dim); transition:.12s; }
  .dropzone:hover, .dropzone.over { border-color:var(--green); color:var(--text); background:#0c130c; }
  html[data-theme="light"] .dropzone { background:#f5f6f0; }
  html[data-theme="light"] .dropzone:hover, html[data-theme="light"] .dropzone.over { background:#eef5ee; }
  .photo-wrap { display:flex; gap:12px; align-items:flex-start; }
  .photo-prev { width:120px; height:120px; object-fit:cover; border:1px solid var(--border-hot); }
  .photo-actions { display:flex; flex-direction:column; gap:6px; }
  .card-photo { width:100%; height:120px; object-fit:cover; border:1px solid var(--border-hot);
    margin:4px 0 10px; display:block; }

  /* ---------- image prompt block ---------- */
  .imgprompt { border:1px solid var(--border-hot); background:#0c110c; padding:12px 14px; }
  html[data-theme="light"] .imgprompt { background:#f5f6f0; }
  .imgprompt-area { background:#070a07 !important; line-height:1.6; }
  html[data-theme="light"] .imgprompt-area { background:#fbfbf6 !important; }

  /* ---------- copy button ---------- */
  .copy-btn { background:#0c110c; border:1px solid var(--border-hot); color:var(--text-dim);
    font-family:var(--mono); font-size:9px; letter-spacing:1px; text-transform:uppercase;
    padding:3px 8px; cursor:pointer; transition:.1s; white-space:nowrap; }
  .copy-btn:hover { color:var(--green); border-color:var(--green); }
  .card-foot { display:flex; align-items:center; justify-content:space-between; gap:8px; margin-top:10px; }
  .card-foot .pill { margin-top:0; }
  html[data-theme="light"] .copy-btn { background:#f5f6f0; }

  /* ---------- the clock ---------- */
  .clock-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(280px,1fr)); gap:14px; }
  .clock-tile { border:1px solid var(--border-hot); background:var(--panel); padding:16px 18px; }
  .clock-tile.failed { border-color:var(--red); }
  .ct-head { display:flex; align-items:center; gap:9px; margin-bottom:12px; }
  .ct-name { flex:1; font-family:var(--display); font-size:13px; color:#dff0df; letter-spacing:.5px; }
  html[data-theme="light"] .ct-name { color:#1b201b; }
  .ct-readout { font-family:var(--mono); font-size:34px; font-weight:bold; letter-spacing:2px; line-height:1; }
  .r-green{ color:var(--green); } .r-amber{ color:var(--amber); } .r-red{ color:var(--red); text-shadow:0 0 12px #f8514955; }
  .ct-sub { font-size:10px; letter-spacing:1px; text-transform:uppercase; margin-top:6px; }
  .fuse { height:6px; background:#0a0f0a; border:1px solid var(--border-hot); margin:12px 0 10px; overflow:hidden; }
  html[data-theme="light"] .fuse { background:#e9eae2; }
  .fuse-fill { height:100%; transition:width .2s linear; }
  .f-green{ background:var(--green); } .f-amber{ background:var(--amber); } .f-red{ background:var(--red); }
  .ct-assigned { font-size:11px; color:var(--amber); letter-spacing:.5px; margin-bottom:6px; }
  .ct-desc { font-size:11px; line-height:1.5; color:var(--text-dim); }

  /* ---------- timeline ---------- */
  .tl-track-wrap { overflow-x:auto; padding-bottom:6px; }
  .tl-track { position:relative; height:180px; min-width:520px; margin-top:6px; }
  .tl-axis { position:absolute; left:0; right:0; top:90px; height:2px; background:var(--border-hot); }
  .tl-tick { position:absolute; top:84px; transform:translateX(-50%); pointer-events:none; }
  .tl-tick .tk-line { width:1px; height:12px; background:var(--text-dim); margin:0 auto; }
  .tl-tick .tk-label { font-size:9px; color:var(--text-dim); margin-top:3px; text-align:center;
    letter-spacing:1px; white-space:nowrap; }
  .tl-dot { position:absolute; top:84px; width:13px; height:13px; border-radius:50%;
    transform:translateX(-50%); cursor:pointer; border:2px solid var(--bg); z-index:2; }
  .tl-dot:hover { transform:translateX(-50%) scale(1.25); }
  .tl-mlabel { position:absolute; transform:translateX(-50%); font-size:9px; color:var(--text);
    white-space:nowrap; max-width:96px; overflow:hidden; text-overflow:ellipsis; cursor:pointer;
    text-align:center; letter-spacing:.3px; }
  .tl-mlabel:hover { color:var(--green); }
  .tl-detail { border:1px solid var(--green); background:var(--panel); padding:14px 16px; margin-bottom:18px; }
  .tl-detail-title { font-family:var(--display); font-size:14px; color:#eafaea; margin-top:3px; }
  html[data-theme="light"] .tl-detail-title { color:#15301b; }

  /* ---------- vertical crisis timeline ---------- */
  .vtl { display:flex; flex-direction:column; }
  .vtl-row { display:flex; align-items:flex-start; }
  .vtl-time { width:72px; flex:none; text-align:right; padding:2px 14px 0 0; font-size:10px;
    letter-spacing:.5px; color:var(--amber); font-family:var(--mono); white-space:nowrap; }
  .vtl-spine { flex:none; width:18px; display:flex; flex-direction:column; align-items:center; padding-top:3px; }
  .vtl-dot { width:11px; height:11px; border-radius:50%; flex:none; }
  .vtl-line { width:2px; flex:1; min-height:20px; background:var(--border-hot); margin:3px 0; }
  .vtl-cards { flex:1; padding:0 0 18px 14px; display:flex; flex-direction:column; gap:5px; }
  .vtl-card { border:1px solid var(--border); background:#0c110c; padding:8px 12px; cursor:pointer; transition:.1s; }
  html[data-theme="light"] .vtl-card { background:#f5f6f0; }
  .vtl-card:hover { border-color:var(--border-hot); }
  .vtl-card-sel { border-color:var(--green) !important; box-shadow:0 0 0 1px #39d35333; }
  .vtl-badge { display:inline-block; font-size:8px; letter-spacing:1px; text-transform:uppercase;
    padding:1px 6px; margin-right:8px; vertical-align:middle; }
  .vtl-card-name { font-size:12px; color:#dff0df; vertical-align:middle; }
  html[data-theme="light"] .vtl-card-name { color:#1b201b; }
  .vtl-card-desc { font-size:11px; color:var(--text-dim); line-height:1.5; margin-top:5px; }

  /* ---------- arcs board ---------- */
  .arc-legend { display:flex; gap:6px; flex-wrap:wrap; }
  .arcs-grid { display:grid; grid-template-columns: 180px repeat(3, 1fr); gap:1px;
    background:var(--border); border:1px solid var(--border-hot); }
  .arc-corner { background:#0d130d; padding:10px 12px; font-size:10px; letter-spacing:2px;

<body>
<div class="scanline"></div>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback } = React;
const CFG = window.LS_CONFIG;
const sb = window.supabase.createClient(CFG.SUPABASE_URL, CFG.SUPABASE_ANON_KEY);

const FACTION_ORDER = ["Legacy Team","The SRU","The Sovereigns","Civilians"];

/* ---------- audit helpers ---------- */
function shortName(email){ return (email||"").split("@")[0] || "someone"; }
function timeAgo(iso){
  if(!iso) return "";
  const s=Math.floor((Date.now()-new Date(iso).getTime())/1000);
  if(s<60) return "just now";
  const m=Math.floor(s/60); if(m<60) return m+"m ago";
  const h=Math.floor(m/60); if(h<24) return h+"h ago";
  const d=Math.floor(h/24); if(d<7) return d+"d ago";
  return new Date(iso).toLocaleDateString();
}
// notes arrive newest-first, so the first hit per entity is the latest edit
function lastEditMap(notes){
  const m={}; (notes||[]).forEach(n=>{ if(!m[n.entity_id]) m[n.entity_id]=n; }); return m;
}
// fire-and-forget audit entry
function logChange(entity_type, entity_id, author, body){
  return sb.from("LS_notes").insert({ entity_type, entity_id, author, body });
}

/* ---------- copy-to-clipboard ---------- */
async function copyText(text){
  try { await navigator.clipboard.writeText(text||""); return true; }
  catch(_){
    try { const ta=document.createElement("textarea"); ta.value=text||"";
      ta.style.position="fixed"; ta.style.opacity="0"; document.body.appendChild(ta);
      ta.select(); document.execCommand("copy"); ta.remove(); return true; }
    catch(e){ return false; }
  }
}
function CopyButton({ text, label="Copy", title="Copy to clipboard" }){
  const [done,setDone] = useState(false);
  const onClick = async (e)=>{ e.stopPropagation();
    const ok = await copyText(typeof text==="function"?text():text);
    if (ok){ setDone(true); setTimeout(()=>setDone(false),1200); }
  };
  return <button type="button" className="copy-btn" title={title} onClick={onClick}>{done?"✓ Copied":label}</button>;
}
// formatted character sheet for clipboard
function characterSheet(c){
  const L=[];
  L.push(`${c.name}${c.full_name?` — ${c.full_name}`:""}${c.age?`, ${c.age}`:""}`);
  if (c.knowledge_domain) L.push(`Knowledge: ${c.knowledge_domain}`);
  if (c.casting_ideas)    L.push(`Casting: ${c.casting_ideas}`);
  if (c.dob)              L.push(`DOB: ${c.dob}`);
  if (c.birthplace)       L.push(`Birthplace: ${c.birthplace}`);
  if (c.description)      L.push("", c.description);
  return L.join("\n");
}
const PHOTO_BUCKET = "ls-photos";
function PhotoDrop({ value, characterId, onChange }){
  const [busy,setBusy] = useState(false);
  const [over,setOver] = useState(false);
  const [err,setErr] = useState("");
  const inputRef = React.useRef();

  const upload = async (file)=>{
    if (!file) return;
    if (!file.type.startsWith("image/")){ setErr("That's not an image file."); return; }
    if (file.size > 10*1024*1024){ setErr("Image is over 10MB — try a smaller one."); return; }
    setErr(""); setBusy(true);
    const ext = (file.name.split(".").pop()||"png").toLowerCase();
    const path = `${characterId}/${Date.now()}.${ext}`;
    const { error } = await sb.storage.from(PHOTO_BUCKET).upload(path, file, { upsert:true, contentType:file.type });
    if (error){ setBusy(false); setErr("Upload failed: "+error.message); return; }
    const { data } = sb.storage.from(PHOTO_BUCKET).getPublicUrl(path);
    setBusy(false);
    onChange(data.publicUrl);
  };

  const onDrop = (e)=>{ e.preventDefault(); setOver(false);
    const f = e.dataTransfer.files && e.dataTransfer.files[0]; upload(f); };

  return (
    <div className="field">
      <label>Photo idea — drag & drop or click to upload</label>
      {value ? (
        <div className="photo-wrap">
          <img src={value} alt="character" className="photo-prev" />
          <div className="photo-actions">
            <button className="copy-btn" onClick={()=>inputRef.current.click()} disabled={busy}>{busy?"Uploading…":"Replace"}</button>
            <button className="copy-btn" onClick={()=>onChange("")} disabled={busy}>Remove</button>
          </div>
        </div>
      ) : (
        <div className={"dropzone"+(over?" over":"")}
          onClick={()=>inputRef.current.click()}
          onDragOver={e=>{e.preventDefault(); setOver(true);}}
          onDragLeave={()=>setOver(false)} onDrop={onDrop}>
          {busy ? "Uploading…" : <><b>Drop an image here</b><br/><span className="dim">or click to browse · PNG/JPG/WebP/GIF · up to 10MB</span></>}
        </div>
      )}
      <input ref={inputRef} type="file" accept="image/*" style={{display:"none"}}
        onChange={e=>upload(e.target.files[0])} />
      {err && <div className="msg err" style={{marginTop:8}}>{err}</div>}
    </div>
  );
}

const ROLE_LABEL = { legacy_team:"Legacy Team specialist", young_engineer:"Young engineer", antagonist:"Antagonist" };
// full bio formatted as an image-generation prompt (paste into ChatGPT etc.)
function imagePrompt(c){
  const name = `${c.name}${c.full_name && c.full_name!==c.name ? ` (${c.full_name})` : ""}`;
  const L=[];
  let opener = `Character portrait of ${name}`;
  if (c.age) opener += `, age ${c.age}`;
  if (c.role && ROLE_LABEL[c.role]) opener += ` — ${ROLE_LABEL[c.role]}`;
  L.push(opener + ".");
  if (c.birthplace)       L.push(`Born in ${c.birthplace}.`);
  if (c.knowledge_domain) L.push(`Background: ${c.knowledge_domain}.`);
  if (c.casting_ideas)    L.push(`Casting / visual reference: ${c.casting_ideas}.`);
  if (c.description)      L.push("", c.description);
  L.push("", "Photorealistic, cinematic lighting, neutral background. From the film LEGACY SYSTEMS.");
  return L.join("\n");
}

/* ============================ LOGIN ============================ */
function Login() {
  const [step, setStep] = useState("email"); // email | pin
  const [email, setEmail] = useState("");
  const [pin, setPin] = useState("");
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState("");
  const PIN_LEN = 4;

  const nextFromEmail = () => {
    const e = email.trim().toLowerCase();
    if (!e) return;
    if (!CFG.WHITELIST.includes(e)) {
      setErr("That email isn't on the writers' room list.");
      return;
    }
    setErr(""); setEmail(e); setStep("pin");
  };

  const submitPin = useCallback(async (code) => {
    setBusy(true); setErr("");
    const { error } = await sb.auth.signInWithPassword({
      email: email.trim().toLowerCase(),
      password: code + CFG.PIN_SALT
    });
    if (error) {
      setErr("Wrong PIN. Try again.");
      setPin(""); setBusy(false);
    }
    // success: onAuthStateChange in App swaps the view
  }, [email]);

  // auto-submit when PIN reaches full length
  const press = (d) => {
    if (busy) return;
    setErr("");
    setPin(prev => {
      if (prev.length >= PIN_LEN) return prev;
      const next = prev + d;
      if (next.length === PIN_LEN) submitPin(next);
      return next;
    });
  };
  const back = () => { if (!busy) setPin(p => p.slice(0, -1)); };

  // physical keyboard support on the PIN step
  useEffect(() => {
    if (step !== "pin") return;
    const onKey = (ev) => {
      if (ev.key >= "0" && ev.key <= "9") press(ev.key);
      else if (ev.key === "Backspace") back();
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [step, busy]);

  return (
    <div className="login-shell">
      <div className="login-box">
        <h1>Legacy Systems</h1>
        <div className="tag">Writers' Room // Restricted</div>

        {step === "email" ? (
          <>
            <div className="label" style={{marginBottom:6}}>Authorized email</div>
            <input type="email" value={email} placeholder="you@email.com"
              onChange={e=>setEmail(e.target.value)}
              onKeyDown={e=>e.key==="Enter"&&nextFromEmail()} autoFocus />
            <button className="btn" onClick={nextFromEmail}>Continue</button>
            {err && <div className="msg err">{err}</div>}
            <div className="dim" style={{marginTop:22, fontSize:11}}>
              Enter your email, then your PIN. No password to remember.
            </div>
          </>
        ) : (
          <>
            <div className="label" style={{marginBottom:10}}>
              Enter PIN — <span className="dim" style={{textTransform:"none",letterSpacing:0}}>{email}</span>
            </div>
            <div className="pin-dots">
              {Array.from({length:PIN_LEN}).map((_,i)=>(
                <span key={i} className={"pin-dot"+(i<pin.length?" on":"")}></span>
              ))}
            </div>
            <div className="pinpad">
              {["1","2","3","4","5","6","7","8","9"].map(d=>(
                <button key={d} className="pinkey" onClick={()=>press(d)} disabled={busy}>{d}</button>
              ))}
              <button className="pinkey ghost" onClick={()=>setStep("email")} disabled={busy}>←</button>
              <button className="pinkey" onClick={()=>press("0")} disabled={busy}>0</button>
              <button className="pinkey ghost" onClick={back} disabled={busy}>⌫</button>
            </div>
            {busy && <div className="msg">Verifying…</div>}
            {err && <div className="msg err">{err}</div>}
          </>
        )}
      </div>
    </div>
  );
}

/* ============================ OVERVIEW ============================ */
function Overview({ data }) {
  const { characters, systems, scenes, themes } = data;
  const legacy = characters.filter(c=>c.role==="legacy_team").length;
  const young  = characters.filter(c=>c.role==="young_engineer").length;
  const antag  = characters.filter(c=>c.role==="antagonist").length;
  const done   = scenes.filter(s=>s.status==="done").length;

  return (
    <>
      <div className="panel">
        <h2>Logline</h2>
        <p className="logline">
          When a catastrophic solar storm destroys the digital infrastructure of modern
          civilization, a group of retired specialists discover they are the last living
          backup of humanity's operating manual.
        </p>
      </div>

      <div className="stat-row" style={{marginBottom:18}}>
        <div className="stat"><div className="n">{legacy}</div><div className="k">Legacy Team</div></div>
        <div className="stat"><div className="n">{young}</div><div className="k">Young Engineers</div></div>
        <div className="stat"><div className="n">{antag}</div><div className="k">Antagonists</div></div>
        <div className="stat"><div className="n">{scenes.length}</div><div className="k">Scenes</div></div>
        <div className="stat"><div className="n">{done}</div><div className="k">Scenes Done</div></div>
      </div>

      <div className="grid2">
        <div className="panel" style={{margin:0}}>
          <h2>Tone &amp; Comps</h2>
          <dl className="kv">
            <dt>Genre</dt><dd>Hard thriller. Apollo 13 DNA. Competence under pressure, not action.</dd>
            <dt>Comps</dt><dd>Apollo 13 · The Martian · Hidden Figures</dd>
            <dt>Not</dt><dd className="dim">RED · Space Cowboys · nostalgia · generational war</dd>
            <dt>The Twist</dt><dd>The more modern the system, the faster it fails.</dd>
          </dl>
        </div>

        <div className="panel" style={{margin:0}}>
          <h2>The Clock — System Status</h2>
          {systems.map(s=>(
            <div className="clock-row" key={s.id}>
              <span className={"lamp "+(s.status||"green")}></span>
              <div style={{flex:1}}>
                <div style={{color:"#dff0df"}}>{s.name}</div>
                <div className="dim" style={{fontSize:11}}>{s.countdown_hours}h window</div>
              </div>
            </div>
          ))}
          {systems.length===0 && <div className="dim">No systems seeded yet.</div>}
        </div>
      </div>

      <div className="panel">
        <h2>Themes</h2>
        <dl className="kv">
          {themes.map(t=>(
            <React.Fragment key={t.id}>
              <dt>{t.title}</dt><dd className="dim">{t.description}</dd>
            </React.Fragment>
          ))}
        </dl>
      </div>
    </>
  );
}

/* ============================ CHARACTERS ============================ */
function Characters({ data, reload, user }) {
  const [editing, setEditing] = useState(null);
  const factions = data.factions;
  const led = lastEditMap(data.notes);
  const byFaction = (fname) => {
    const f = factions.find(x=>x.name===fname);
    return data.characters.filter(c=>c.faction_id === (f && f.id));
  };

  return (
    <>
      <div className="panel" style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div><span className="label">Cast</span> &nbsp;
          <span className="dim">{data.characters.length} characters · click any card to edit</span></div>
      </div>

      {FACTION_ORDER.map(fname=>{
        const f = factions.find(x=>x.name===fname);
        const list = byFaction(fname);
        if (!f) return null;
        return (
          <div key={fname}>
            <div className="faction-head">
              <span className="bar" style={{background:f.color||"#39d353"}}></span>
              <h3 style={{color:f.color||"#dff0df"}}>{fname}</h3>
              <span className="ct">{list.length}</span>
            </div>
            <div className="card-grid">
              {list.map(c=>(

/* ============================ SCENES ============================ */
const ACTS = ["I","II","III"];
const SCENE_STATUS = ["idea","outlined","drafted","done"];

/* ---------- Fountain engine (subset) ---------- */
const SCENE_RE = /^(int|ext|est|int\.?\/ext|i\/e)[\.\/ ]/i;
function parseFountain(text){
  const lines = (text||"").replace(/\r/g,"").split("\n");
  const els = [];
  const blank = s => !s || s.trim()==="";
  for (let i=0;i<lines.length;i++){
    const t = lines[i].trim();
    if (blank(t)) continue;
    // forced/auto scene heading
    if (t.startsWith(".") && !t.startsWith("..")) { els.push({type:"scene",text:t.slice(1).trim().toUpperCase()}); continue; }
    if (SCENE_RE.test(t)) { els.push({type:"scene",text:t.toUpperCase()}); continue; }
    // centered  >text<
    if (t.startsWith(">") && t.endsWith("<")) { els.push({type:"centered",text:t.slice(1,-1).trim()}); continue; }
    // transition
    if (t.startsWith(">")) { els.push({type:"transition",text:t.slice(1).trim().toUpperCase()}); continue; }
    if (/[A-Z0-9'’\.\- ]+TO:$/.test(t) && t===t.toUpperCase()) { els.push({type:"transition",text:t}); continue; }
    // character cue: UPPERCASE line, blank before, dialogue after  (or forced @Name)
    const forced = t.startsWith("@");
    const cue = forced ? t.slice(1).trim() : t;
    const prevBlank = i===0 || blank(lines[i-1]);
    const nextNonBlank = i+1<lines.length && !blank(lines[i+1]);
    const looksCharacter = forced ||
      (prevBlank && nextNonBlank && cue===cue.toUpperCase() && /[A-Z]/.test(cue) && !cue.endsWith(":"));
    if (looksCharacter){
      els.push({type:"character",text:cue.toUpperCase()});
      i++;
      while (i<lines.length && !blank(lines[i])){
        const dt = lines[i].trim();
        if (dt.startsWith("(") && dt.endsWith(")")) els.push({type:"parenthetical",text:dt});
        else els.push({type:"dialogue",text:dt});
        i++;
      }
      continue;
    }
    els.push({type:"action",text:t});
  }
  return els;
}

function orderScenes(scenes){
  return [...scenes].sort((a,b)=>{
    const ai=ACTS.indexOf(a.act||"I"), bi=ACTS.indexOf(b.act||"I");
    return (ai-bi) || ((a.sort_order||0)-(b.sort_order||0)) || (a.title||"").localeCompare(b.title||"");
  });
}

const SCRIPT_TITLE = "LEGACY SYSTEMS";
const SCRIPT_BYLINE = "Jimmy Cannon & Ryan Ross";

function compileFountain(scenes){
  let out = `Title: ${SCRIPT_TITLE}\nCredit: Written by\nAuthor: ${SCRIPT_BYLINE}\nDraft date: ${new Date().toLocaleDateString()}\n\n`;
  orderScenes(scenes).forEach(s=>{ out += (s.content||"").trim() + "\n\n"; });
  return out;
}

function compileFDX(scenes){
  const esc = s => s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  const typeMap = {scene:"Scene Heading",action:"Action",character:"Character",
    dialogue:"Dialogue",parenthetical:"Parenthetical",transition:"Transition",centered:"Action"};
  let body="";
  orderScenes(scenes).forEach(s=>{
    parseFountain(s.content).forEach(e=>{
      body += `    <Paragraph Type="${typeMap[e.type]||"Action"}">\n      <Text>${esc(e.text)}</Text>\n    </Paragraph>\n`;
    });
  });
  return `<?xml version="1.0" encoding="UTF-8" standalone="no"?>\n<FinalDraft DocumentType="Script" Template="No" Version="1">\n  <Content>\n${body}  </Content>\n</FinalDraft>\n`;
}

function download(filename, text, mime){
  const blob = new Blob([text], {type:mime||"text/plain;charset=utf-8"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href=url; a.download=filename; document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 1500);
}

function exportBible(data) {
  const { factions, characters, systems, scenes, themes, arcs, events, notes } = data;
  const date = new Date().toLocaleDateString("en-US", {year:"numeric",month:"long",day:"numeric"});
  const lines = [];

  lines.push(`# LEGACY SYSTEMS — Story Bible Export`);
  lines.push(`*Generated: ${date}*`);
  lines.push(`\n> **Legacy Systems** — A 72-hour race to manually restart civilization's critical infrastructure before permanent failure, while an ideological insurgency fights to let it die.\n`);
  lines.push("---\n");

  // ── CANON SECTIONS ──
  lines.push("## CURRENT CANON");
  lines.push("*Decisions that are locked.*\n");
  lines.push("- The inciting event is a Carrington-class geomagnetic storm (Sept 14, 2027, 11:47 AM Eastern).");
  lines.push("- The story runs 72 hours from storm to first stabilized system.");
  lines.push("- Three factions: Legacy Engineers (old-world knowledge), The SRU (government authority), The Sovereigns (ideological insurgency).");
  lines.push("- Vivian Rusk — not Cole Bridger — is the true architect of the Sovereign network.");
  lines.push("- Grace Bridger (Cole's daughter) is the potential defector / emotional fracture inside the Sovereigns.");
  lines.push("- Vic Harrow assembled the Legacy Engineers. He warned about civilizational single-point failure and was ignored.");
  lines.push("- Alan Morse and Vivian Rusk may know each other from pre-crash policy circles.");
  lines.push("- Ellen Harrow (Vic's wife) stays at the Harrow farm, operates the ham radio, and becomes the unofficial dispatcher and emotional spine of the operation. She is not a field operative — she is the communications backbone, memory keeper, and the last voice Vic hears.");
  lines.push("- Kiki Kross (Kim Kardashian analog, 44) and her daughter Nova Kross (North West analog, 11) are aboard a private jet in the cold open. **Nova dies in the crash. Kiki survives.** This is locked.");
  lines.push("- 'Just us' / 'Just us' is the last exchange between Kiki and Nova. The audience does not know Nova dies when they say it. They will remember it when they find out.");
  lines.push("- Kiki's post-crash arc: a woman who built her entire identity on being seen, now invisible and anonymous in a world without screens, carrying the knowledge that she turned the camera off at the end.");
  lines.push("");
  lines.push("**Ellen Harrow — locked arc beats:**");
  lines.push("- EARLY: They joke over the radio. She's annoyed he left without enough socks. She becomes unexpectedly good at it.");
  lines.push("- MIDDLE: Running multiple contacts, managing panic, relaying messages from Ruth/Desmond/Gideon/SRU. People start asking for 'Ellen' as if she's an official command node.");
  lines.push("- LATE: Vic keeps promising 'I'll see you after this.' Ellen knows he's lying before he does.");
  lines.push("- FINALE: Vic is trapped. Ellen is the last voice he hears.");
  lines.push("");
  lines.push("**Locked dialogue — Act II:**");
  lines.push("> ELLEN (V.O.): Victor Harrow, you do not get to make this noble.");
  lines.push("> VIC: I was hoping for handsome.");
  lines.push("> ELLEN (V.O.): You were always handsome. Noble was where you got slippery.");
  lines.push("");
  lines.push("**Locked dialogue — Finale:**");
  lines.push("> VIC: Ellen? [Static.] El?");
  lines.push("> ELLEN (V.O.): I'm here.");
  lines.push("> VIC: Tell me about the farm.");
  lines.push("> ELLEN (V.O.): The west field needs mowing. The pump you fixed is already leaking again. (breaking) And I am very angry with you.");
  lines.push("> VIC: Good. Hold onto that. You'll need something to do tomorrow.\n");
  lines.push("---\n");

  lines.push("## STILL FLUID");
  lines.push("*Ideas we like but may change.*\n");
  lines.push("- *(Add fluid ideas here — character arcs, plot beats, structural choices under debate)*\n");
  lines.push("---\n");

  lines.push("## CONTINUITY WATCHLIST");
  lines.push("*Names, dates, mechanics, or plot points that need cleanup.*\n");
  lines.push("- *(Log continuity flags here — inconsistencies, unresolved references, placeholder names)*\n");
  lines.push("---\n");

  // ── FACTIONS ──
  lines.push("## FACTIONS\n");
  (factions||[]).forEach(f => {
    lines.push(`### ${f.name}`);
    if (f.description) lines.push(f.description);
    lines.push("");
  });
  lines.push("---\n");

  // ── CHARACTERS ──
  lines.push("## CHARACTERS\n");
  const charsByFaction = {};
  (characters||[]).forEach(c => {
    const fac = (factions||[]).find(f=>f.id===c.faction_id);
    const facName = fac?.name || "Unassigned";
    if (!charsByFaction[facName]) charsByFaction[facName] = [];
    charsByFaction[facName].push(c);
  });
  FACTION_ORDER.forEach(fname => {
    const group = charsByFaction[fname];
    if (!group?.length) return;
    lines.push(`### ${fname.toUpperCase()}\n`);
    group.forEach(c => {
      const mainTag = c.status === "idea" ? " *(secondary)*" : "";
      lines.push(`**${c.full_name || c.name}**${mainTag} — Age ${c.age||"?"} — ${c.knowledge_domain||""}`);
      if (c.description) lines.push(c.description);
      lines.push("");
    });
  });
  lines.push("---\n");

  // ── CHARACTER ARCS ──
  if (arcs?.length) {
    lines.push("## CHARACTER ARCS\n");
    arcs.forEach(a => {
      const ch = (characters||[]).find(c=>c.id===a.character_id);
      lines.push(`**${ch?.full_name||ch?.name||"Unknown"}** — ${a.arc_type||""} arc — Status: ${a.status||""}`);
      if (a.arc_text) lines.push(a.arc_text);
      lines.push("");
    });
    lines.push("---\n");
  }

  // ── INFRASTRUCTURE SYSTEMS ──
  if (systems?.length) {
    lines.push("## INFRASTRUCTURE SYSTEMS\n");
    const byCategory = {};
    systems.forEach(s => {
      const cat = s.category || "Other";
      if (!byCategory[cat]) byCategory[cat] = [];
      byCategory[cat].push(s);
    });
    Object.entries(byCategory).forEach(([cat, sysList]) => {
      lines.push(`### ${cat}\n`);
      sysList.forEach(s => {
        const status = {green:"✓ STABLE", yellow:"⚠ AT RISK", red:"✕ CRITICAL"}[s.status] || s.status;
        lines.push(`**${s.name}** — ${status}${s.countdown_hours ? ` — ${s.countdown_hours}h to failure` : ""}`);
        if (s.description) lines.push(s.description);
        if (s.manual_override_note) lines.push(`*Manual override: ${s.manual_override_note}*`);
        lines.push("");
      });
    });
    lines.push("---\n");
  }

  // ── 72-HOUR CRISIS TIMELINE ──
  if (events?.length) {
    lines.push("## 72-HOUR CRISIS TIMELINE\n");
    const parseHours = st => {
      if (!st) return 999;
      const s = st.toLowerCase().trim();
      const hourMatch = s.match(/hour\s*(\d+)/);
      if (hourMatch) return parseInt(hourMatch[1]);
      const dayMatch = s.match(/day\s*(\d+)/);
      if (dayMatch) return parseInt(dayMatch[1]) * 24;
      const hMatch = s.match(/^(\d+)h/);
      if (hMatch) return parseInt(hMatch[1]);
      return 999;
    };
    const sorted = [...events].sort((a,b)=>parseHours(a.story_time)-parseHours(b.story_time));
    sorted.forEach(e => {
      const h = parseHours(e.story_time);
      const label = h < 999 ? `T+${h}h` : (e.story_time||"T+?h");
      lines.push(`**${label} — ${e.title}**`);
      if (e.description) lines.push(e.description);
      lines.push("");
    });
    lines.push("---\n");
  }

  // ── SCENES ──
  if (scenes?.length) {
    lines.push("## SCENES\n");
    scenes.forEach(s => {
      lines.push(`### ${s.scene_number ? `Scene ${s.scene_number}: ` : ""}${s.title}`);
      if (s.location) lines.push(`*Location: ${s.location}*`);
      if (s.status) lines.push(`*Status: ${s.status}*`);
      if (s.description) lines.push(`\n${s.description}`);
      if (s.content) lines.push(`\n${s.content}`);
      lines.push("");
    });
    lines.push("---\n");
  }

  // ── THEMES ──
  if (themes?.length) {
    lines.push("## THEMES\n");
    themes.forEach(t => {
      lines.push(`**${t.name}** — ${t.status||""}`);
      if (t.description) lines.push(t.description);
      lines.push("");
    });
    lines.push("---\n");
  }

  // ── RECENT NOTES ──
  const recentNotes = (notes||[]).slice(0, 20);
  if (recentNotes.length) {
    lines.push("## ROOM NOTES (most recent 20)\n");
    recentNotes.forEach(n => {
      const when = n.created_at ? new Date(n.created_at).toLocaleDateString() : "";
      lines.push(`**[${when}]** ${n.content}`);
      lines.push("");
    });
  }

  const filename = `LegacySystems_Bible_${new Date().toISOString().slice(0,10)}.md`;
  download(filename, lines.join("\n"), "text/markdown;charset=utf-8");
}

function screenplayPrintDoc(scenes){
  const esc = s => s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  const cls = {scene:"scene",action:"action",character:"character",
    parenthetical:"parenthetical",dialogue:"dialogue",transition:"transition",centered:"centered"};
  let bodyHTML="";
  orderScenes(scenes).forEach(s=>{
    parseFountain(s.content).forEach(e=>{ bodyHTML += `<p class="${cls[e.type]||"action"}">${esc(e.text)||"&nbsp;"}</p>`; });
  });
  return `<!DOCTYPE html><html><head><meta charset="utf-8"><title>${SCRIPT_TITLE}</title><style>
    @page { size:letter; margin:1in 1in 1in 1.5in; }
    body { font:12pt "Courier New",Courier,monospace; color:#000; }
    p { margin:0 0 12pt; white-space:pre-wrap; }
    .title-page { height:8.5in; display:flex; flex-direction:column; justify-content:center;
      align-items:center; text-align:center; page-break-after:always; }
    .title-page h1 { font-size:12pt; font-weight:bold; text-transform:uppercase; letter-spacing:1px; }
    .scene { font-weight:bold; text-transform:uppercase; margin-top:18pt; }
    .character { margin:12pt 0 0 2.2in; text-transform:uppercase; }
    .parenthetical { margin:0 0 0 1.6in; }
    .dialogue { margin:0 1.5in 0 1in; }
    .transition { text-align:right; text-transform:uppercase; }
    .centered { text-align:center; }
  </style></head><body>
  <div class="title-page"><h1>${SCRIPT_TITLE}</h1><div><br><br>Written by<br><br>${SCRIPT_BYLINE}</div></div>
  ${bodyHTML}
  </body></html>`;
}

function printScript(scenes){
  const w = window.open("", "_blank");
  if (!w){ alert("Allow pop-ups for this site to export the PDF."); return; }
  w.document.write(screenplayPrintDoc(scenes));
  w.document.close(); w.focus();
  setTimeout(()=>w.print(), 400);
}

function Screenplay({ text }){
  const els = parseFountain(text);
  if (!els.length) return <div className="dim" style={{padding:20}}>Nothing to preview yet — write some lines.</div>;
  const cls = {scene:"sp-scene",action:"sp-action",character:"sp-char",
    parenthetical:"sp-paren",dialogue:"sp-dia",transition:"sp-trans",centered:"sp-center"};
  return (
    <div className="screenplay">
      {els.map((e,i)=><p key={i} className={cls[e.type]}>{e.text}</p>)}
    </div>
  );
}

function Scenes({ data, reload, user }) {
  const scenes = data.scenes;
  const [selId, setSelId] = useState(scenes[0] ? scenes[0].id : null);

  // keep a valid selection as the list changes
  useEffect(()=>{
    if (!scenes.find(s=>s.id===selId)) setSelId(scenes[0] ? scenes[0].id : null);
  }, [scenes, selId]);

  const selected = scenes.find(s=>s.id===selId) || null;

  const led = lastEditMap(data.notes);

  const newScene = async () => {
    const { data:rows, error } = await sb.from("LS_scenes")
      .insert({ title:"Untitled scene", act:"I", status:"idea", content:"" })
      .select();
    if (error) { alert("Couldn't create scene: "+error.message); return; }
    if (rows && rows[0]) await logChange("scene", rows[0].id, user.email, "created scene");
    await reload();
    if (rows && rows[0]) setSelId(rows[0].id);
  };

  const grouped = ACTS.map(a=>({ act:a, list:scenes.filter(s=>(s.act||"I")===a) }))
    .concat([{ act:"—", list:scenes.filter(s=>!ACTS.includes(s.act||"I")) }])
    .filter(g=>g.list.length>0);

  return (
    <>
    <div className="export-bar">
      <span className="label">Export full script</span>
      <button className="btn sm" onClick={()=>download("Legacy_Systems.fountain", compileFountain(scenes), "text/plain")}>.fountain</button>
      <button className="btn sm" onClick={()=>download("Legacy_Systems.fdx", compileFDX(scenes), "application/xml")}>Final Draft (.fdx)</button>
      <button className="btn sm" onClick={()=>printScript(scenes)}>Print / PDF</button>
      <span className="dim" style={{fontSize:11}}>compiles all {scenes.length} scenes in act order</span>
    </div>
    <div className="scenes-wrap">
      <div className="scene-rail">
        <button className="btn" style={{marginTop:0,marginBottom:14}} onClick={newScene}>+ New scene</button>
        {grouped.map(g=>(
          <div key={g.act} style={{marginBottom:14}}>
            <div className="rail-act">Act {g.act} · {g.list.length}</div>
            {g.list.map(s=>(
              <div key={s.id}
                className={"scene-pill"+(s.id===selId?" active":"")}
                onClick={()=>setSelId(s.id)}>
                <div className="scene-pill-t">{s.title||"Untitled"}</div>
                <span className={"sdot "+s.status}></span>
                <span className="scene-pill-s">{s.status}</span>
              </div>
            ))}
          </div>
        ))}
        {scenes.length===0 && <div className="dim">No scenes yet. Create one.</div>}
      </div>

      <div className="scene-editor">
        {selected
          ? <SceneEditor key={selected.id} scene={selected} characters={data.characters}
              user={user} reload={reload} onDeleted={reload} lastEdit={led[selected.id]} />
          : <div className="dim" style={{padding:40,textAlign:"center"}}>Select or create a scene to start writing.</div>}
      </div>
    </div>
    </>
  );
}

function SceneEditor({ scene, characters, user, reload, onDeleted, lastEdit }) {
  const [draft, setDraft] = useState({ ...scene });
  const [dirty, setDirty] = useState(false);
  const [saving, setSaving] = useState(false);
  const [savedAt, setSavedAt] = useState(null);
  const [mode, setMode] = useState("write"); // write | preview
  const [showHelp, setShowHelp] = useState(false);
  const set = (k,v)=>{ setDraft(d=>({...d,[k]:v})); setDirty(true); };

  const charIds = draft.character_ids || [];
  const toggleChar = (id)=>{
    const next = charIds.includes(id) ? charIds.filter(x=>x!==id) : [...charIds, id];
    set("character_ids", next);
  };

  const save = useCallback(async ()=>{
    setSaving(true);
    const patch = {
      title:draft.title, act:draft.act, status:draft.status,
      content:draft.content, character_ids:draft.character_ids||[]
    };
    const { error } = await sb.from("LS_scenes").update(patch).eq("id", draft.id);
    setSaving(false);
    if (error) { alert("Save failed: "+error.message); return; }
    sb.from("LS_notes").insert({ entity_type:"scene", entity_id:draft.id,
      author:user.email, body:`edited "${draft.title}"` });
    setDirty(false); setSavedAt(new Date());
    reload();
  }, [draft, user]);

  // Cmd/Ctrl+S to save
  useEffect(()=>{
    const onKey = (e)=>{
      if ((e.metaKey||e.ctrlKey) && e.key.toLowerCase()==="s") { e.preventDefault(); if (dirty) save(); }
    };
    window.addEventListener("keydown", onKey);
    return ()=>window.removeEventListener("keydown", onKey);
  }, [dirty, save]);

  // autosave on unmount (switching scenes / leaving) if dirty
  const dirtyRef = React.useRef(dirty); dirtyRef.current = dirty;
  const saveRef = React.useRef(save); saveRef.current = save;
  useEffect(()=>()=>{ if (dirtyRef.current) saveRef.current(); }, []);

  const del = async ()=>{
    if (!confirm(`Delete "${draft.title}"? This can't be undone.`)) return;
    const { error } = await sb.from("LS_scenes").delete().eq("id", draft.id);
    if (error) { alert("Delete failed: "+error.message); return; }
    await logChange("scene", draft.id, user.email, `deleted "${draft.title}"`);
    onDeleted();
  };

  return (
    <>
      <div className="editor-bar">
        <input className="scene-title" value={draft.title||""}
          onChange={e=>set("title",e.target.value)} placeholder="Scene title" />
        <div className="editor-bar-right">
          <select value={draft.act||"I"} onChange={e=>set("act",e.target.value)}>
            {ACTS.map(a=><option key={a} value={a}>Act {a}</option>)}
          </select>
          <select value={draft.status||"idea"} onChange={e=>set("status",e.target.value)}>
            {SCENE_STATUS.map(s=><option key={s} value={s}>{s}</option>)}
          </select>
        </div>
      </div>

      <div className="char-tags">
        {characters.map(c=>(
          <button key={c.id}
            className={"ctag"+(charIds.includes(c.id)?" on":"")}
            onClick={()=>toggleChar(c.id)}>{c.name}</button>
        ))}
      </div>

      <div className="sp-toolbar">
        <button className={"toggle"+(mode==="write"?" on":"")} onClick={()=>setMode("write")}>Write</button>
        <button className={"toggle"+(mode==="preview"?" on":"")} onClick={()=>setMode("preview")}>Preview</button>
        <CopyButton text={()=>draft.content||""} label="Copy scene" title="Copy scene text" />
        <button className="toggle" onClick={()=>setShowHelp(h=>!h)} style={{marginLeft:"auto"}}>
          {showHelp?"Hide format help":"Format help"}</button>
      </div>
      {showHelp && (
        <div className="fountain-help">
          <b>Fountain quick rules</b> — write naturally, just follow these:
          <ul>
            <li><b>Scene heading:</b> start the line with <code>INT.</code> or <code>EXT.</code> in CAPS — <code>INT. RAIL DISPATCH - NIGHT</code></li>
            <li><b>Character:</b> put the name in CAPS on its own line, dialogue on the line right below. No quotation marks.</li>
            <li><b>Parenthetical:</b> <code>(quietly)</code> on its own line between the name and the line.</li>
            <li><b>Action:</b> just write it normally — anything that isn't the above.</li>
            <li><b>Transition:</b> a CAPS line ending in <code>TO:</code> — <code>CUT TO:</code></li>
          </ul>
          Blank line between blocks. Preview shows how it'll format; Export turns it into a real script.
        </div>
      )}

      {mode==="write"
        ? <textarea className="script-area" value={draft.content||""}
            onChange={e=>set("content",e.target.value)}
            placeholder={"INT. RAIL DISPATCH CENTER - NIGHT\n\nRuth walks in and picks up a marker.\n\nRUTH\nYou still have the boards?"} />
        : <Screenplay text={draft.content||""} />}

      <div className="editor-foot">
        <button className="btn" style={{width:"auto",marginTop:0}} disabled={!dirty||saving} onClick={save}>
          {saving ? "Saving…" : dirty ? "Save (⌘S)" : "Saved"}
        </button>
        {savedAt && !dirty && <span className="saved-tag">✓ saved {savedAt.toLocaleTimeString()}</span>}
        {!savedAt && !dirty && lastEdit && <span className="dim" style={{fontSize:11}}>last edit: {shortName(lastEdit.author)} · {timeAgo(lastEdit.created_at)}</span>}
        {dirty && <span className="dim" style={{fontSize:11}}>unsaved changes — autosaves when you switch scenes</span>}
        <button className="del-btn" onClick={del}>Delete scene</button>
      </div>
    </>
  );
}

/* ============================ TIMELINE ============================ */
const STORM_YEAR = 2027;
const TL_TYPES = ["birth","retirement","pushed_out","milestone","storm","shutdown","restart_deadline","story_beat"];

function birthYearOf(c){
  if (c.dob){ const m=String(c.dob).match(/(\d{4})/); if(m) return parseInt(m[1]); }
  if (c.age!=null) return STORM_YEAR - c.age;
  return null;
}
function yearOf(s){ const m=String(s||"").match(/(\d{4})/); return m?parseInt(m[1]):null; }
function parseStoryHours(s){
  if (!s) return null;
  const d=String(s).match(/day\s+(\d+)/i); if(d) return parseInt(d[1])*24;
  const h=String(s).match(/hour\s+(\d+)/i); if(h) return parseInt(h[1]);
  const n=String(s).match(/(\d+)/); return n?parseInt(n[1]):null;
}
function fmtHours(h){
  if (h<24) return `Hour ${h}`;
  const d=h/24; return Number.isInteger(d)?`Day ${d}`:`Day ${d.toFixed(1)}`;
}

function Timeline({ data, reload, user }){
  const [sel, setSel] = useState(null);     // selected marker object
  const [editing, setEditing] = useState(null); // event obj | {isNew, layer}
  const factionColor = c => { const f=data.factions.find(x=>x.id===c.faction_id); return (f&&f.color)||"#39d353"; };
  const events = data.events || [];

  // ----- LIFETIMES -----
  const births = data.characters.map(c=>{
    const year=birthYearOf(c);
    return year ? { id:"b-"+c.id, kind:"birth", year, label:c.name, color:factionColor(c),
      detail:`${c.name} born ~${year}${c.knowledge_domain?` · ${c.knowledge_domain}`:""}` } : null;
  }).filter(Boolean);
  const lifeEvents = events.filter(e=>e.layer==="lifetimes").map(e=>({
    id:e.id, kind:"event", year:yearOf(e.event_date), label:e.title, color:"#d29922", e,
    detail:e.description, when:e.event_date }));
  const lifeMarkers = [...births, ...lifeEvents.filter(m=>m.year)];
  const years = lifeMarkers.map(m=>m.year);
  const minYear = years.length ? Math.floor(Math.min(...years)/10)*10 : 1940;
  const spanY = Math.max(STORM_YEAR - minYear, 10);
  const xLife = y => Math.max(0, Math.min(100, (y-minYear)/spanY*100));
  const lifeTicks = [];
  for (let y=minYear; y<=STORM_YEAR; y+=10) lifeTicks.push(y);

  // ----- CRISIS -----
  const deadlines = data.systems.map(s=> s.countdown_hours!=null ? {
    id:"s-"+s.id, kind:"deadline", hours:s.countdown_hours, label:s.name,
    color: s.status==="red"?"#f85149":s.status==="amber"?"#d29922":"#39d353",
    detail:`${s.name} — fails at ${fmtHours(s.countdown_hours)} without manual operation` } : null).filter(Boolean);
  const crisisEvents = events.filter(e=>e.layer==="crisis").map(e=>({
    id:e.id, kind:"event", hours:parseStoryHours(e.story_time), label:e.title, color:"#58a6ff", e,
    detail:e.description, when:e.story_time })).filter(m=>m.hours!=null);
  const crisisMarkers = [...crisisEvents, ...deadlines];
  const maxH = Math.max(120, ...crisisMarkers.map(m=>m.hours)) * 1.08;
  const xCrisis = h => Math.max(0, Math.min(100, h/maxH*100));
  const crisisTicks = [0,6,24,48,72,96,120,168,240].filter(h=>h<=maxH);

  const Track = ({ markers, xOf, ticks, tickLabel }) => {
    // stagger labels so they don't stack
    const sorted = [...markers].sort((a,b)=>xOf(a)-xOf(b));
    const lvl = {}; sorted.forEach((m,i)=>{ lvl[m.id]=i%3; });
    return (
      <div className="tl-track">
        <div className="tl-axis"></div>
        {ticks.map((t,i)=>(
          <div className="tl-tick" key={i} style={{left:xOf({_t:t})+"%"}}>
            <div className="tk-line"></div><div className="tk-label">{tickLabel(t)}</div>
          </div>
        ))}
        {sorted.map((m,i)=>{
          const x=xOf(m); const above=i%2===0; const off=18+lvl[m.id]*15;
          return (
            <React.Fragment key={m.id}>
              <div className="tl-dot" style={{left:x+"%", background:m.color,
                boxShadow: sel&&sel.id===m.id ? "0 0 0 3px var(--green)" : "none"}}
                onClick={()=>setSel(m)} title={m.label}></div>
              <div className={"tl-mlabel"} onClick={()=>setSel(m)}
                style={{left:x+"%", top: above ? (84-off)+"px" : (96+off)+"px"}}>{m.label}</div>
            </React.Fragment>
          );
        })}
      </div>
    );
  };

  return (
    <>
      <div className="panel" style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
        <div><span className="label">Timeline</span> &nbsp;
          <span className="dim">two layers — human lifetimes vs. the crisis countdown. Their collision is the movie.</span></div>
        <div style={{display:"flex",gap:8}}>
          <button className="btn sm" onClick={()=>setEditing({isNew:true, layer:"lifetimes"})}>+ Lifetime event</button>
          <button className="btn sm" onClick={()=>setEditing({isNew:true, layer:"crisis"})}>+ Crisis beat</button>
        </div>
      </div>

      <div className="panel">
        <h2>Lifetimes <span className="dim" style={{fontSize:11,letterSpacing:0,textTransform:"none"}}>· {minYear}–{STORM_YEAR} · births auto-plotted from age/DOB</span></h2>
        <div className="tl-track-wrap">
          <Track markers={lifeMarkers} xOf={m=> "_t" in m ? xLife(m._t) : xLife(m.year)}
            ticks={lifeTicks} tickLabel={t=>t} />
        </div>
      </div>

      <div className="panel">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8,marginBottom:18}}>
          <div>
            <h2 style={{margin:0}}>Crisis Timeline</h2>
            <div className="dim" style={{fontSize:11,marginTop:4}}>Hour 0 onward · red = critical · amber = at risk · blue = story beat · click any card for detail</div>
          </div>
          <button className="btn sm" onClick={()=>setEditing({isNew:true, layer:"crisis"})}>+ Crisis beat</button>
        </div>
        <div className="vtl">
          {(()=>{
            const grouped = {};
            crisisMarkers.forEach(m=>{
              const h = m.hours ?? 0;
              if(!grouped[h]) grouped[h]=[];
              grouped[h].push(m);
            });
            const times = Object.keys(grouped).map(Number).sort((a,b)=>a-b);
            return times.map((h,i)=>{
              const items = grouped[h];
              const isLast = i===times.length-1;
              const dotColor = items.find(m=>m.color==="#f85149") ? "#f85149"
                             : items.find(m=>m.color==="#d29922") ? "#d29922"
                             : "var(--blue)";
              return (
                <div className="vtl-row" key={h}>
                  <div className="vtl-time">{fmtHours(h)}</div>
                  <div className="vtl-spine">
                    <div className="vtl-dot" style={{background:dotColor,
                      boxShadow:dotColor==="var(--blue)"?"none":`0 0 7px ${dotColor}99`}}></div>
                    {!isLast && <div className="vtl-line"></div>}
                  </div>
                  <div className="vtl-cards">
                    {items.map(m=>(
                      <div key={m.id}
                        className={"vtl-card"+(sel&&sel.id===m.id?" vtl-card-sel":"")}
                        onClick={()=>{ if(m.kind==="event") setEditing(m.e); else setSel(sel&&sel.id===m.id?null:m); }}>
                        <span className="vtl-badge" style={{
                          background: m.kind==="deadline"
                            ? (m.color||"var(--border-hot)")
                            : "var(--border-hot)",
                          color: m.kind==="deadline" ? "#000" : "var(--text-dim)"
                        }}>
                          {m.kind==="deadline"
                            ? (m.color==="#f85149" ? "critical" : "at risk")
                            : "event"}
                        </span>
                        <span className="vtl-card-name">{m.label}</span>
                        {m.detail && <div className="vtl-card-desc">
                          {m.detail.length>120 ? m.detail.slice(0,120)+"…" : m.detail}
                        </div>}
                      </div>
                    ))}
                  </div>
                </div>
              );
            });
          })()}
        </div>
      </div>

      {sel && (
        <div className="tl-detail">
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:10}}>
            <div>
              <span className="label">{sel.kind==="birth"?"Birth":sel.kind==="deadline"?"System deadline":"Event"}</span>
              <div className="tl-detail-title">{sel.label}{sel.when?` · ${sel.when}`:sel.year?` · ${sel.year}`:sel.hours!=null?` · ${fmtHours(sel.hours)}`:""}</div>
            </div>
            <div style={{display:"flex",gap:8}}>
              {sel.kind==="event" && <button className="btn sm" onClick={()=>setEditing(sel.e)}>Edit</button>}
              <button className="copy-btn" onClick={()=>setSel(null)}>Close</button>
            </div>
          </div>
          {sel.detail && <p style={{margin:"10px 0 0", fontSize:13, lineHeight:1.6}}>{sel.detail}</p>}
          {sel.kind==="birth" && <p className="dim" style={{fontSize:11,marginTop:8}}>Auto-derived from the character's age. Set a DOB on the character to make this exact.</p>}
          {sel.kind==="deadline" && <p className="dim" style={{fontSize:11,marginTop:8}}>Auto-derived from The Clock. Change the system's countdown to move this.</p>}
        </div>
      )}

      {editing && <TimelineEventModal data={data} editing={editing} user={user}
        onClose={()=>setEditing(null)} onSaved={()=>{ setEditing(null); setSel(null); reload(); }} />}
    </>
  );
}

              placeholder={f.layer==="lifetimes"?"e.g. Ruth retires from BNSF":"e.g. President briefed"} /></div>
          <div className="row2">
            <div className="field"><label>Layer</label>
              <select value={f.layer} onChange={e=>set("layer",e.target.value)}>
                <option value="lifetimes">Lifetimes</option>
                <option value="crisis">Crisis</option>
              </select></div>
            <div className="field"><label>Type</label>
              <select value={f.type||""} onChange={e=>set("type",e.target.value)}>
                {TL_TYPES.map(t=><option key={t} value={t}>{t}</option>)}
              </select></div>
          </div>
          {f.layer==="lifetimes"
            ? <div className="field"><label>Year (or date)</label>
                <input value={f.event_date||""} onChange={e=>set("event_date",e.target.value)} placeholder="e.g. 2009" /></div>
            : <div className="field"><label>Story time</label>
                <input value={f.story_time||""} onChange={e=>set("story_time",e.target.value)} placeholder="e.g. Day 2  /  Hour 6" /></div>}
          <div className="field"><label>Linked character (optional)</label>
            <select value={f.character_id||""} onChange={e=>set("character_id",e.target.value||null)}>
              <option value="">— none —</option>
              {data.characters.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
            </select></div>
          <div className="field"><label>Description</label>
            <textarea rows={4} value={f.description||""} onChange={e=>set("description",e.target.value)} /></div>
          <div style={{display:"flex",alignItems:"center",gap:14}}>
            <button className="btn" style={{width:"auto"}} disabled={busy} onClick={save}>{busy?"Saving…":"Save event"}</button>
            {!isNew && <button className="del-btn" onClick={del}>Delete</button>}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ============================ THE CLOCK ============================ */
const CLOCK_STATUS = ["green","amber","red"];
function hms(sec){
  sec = Math.max(0, Math.floor(sec));
  const h=Math.floor(sec/3600), m=Math.floor((sec%3600)/60), s=sec%60;
  const p=n=>String(n).padStart(2,"0");
  return `${p(h)}:${p(m)}:${p(s)}`;
}

function Clock({ data, reload, user }){
  const systems = [...data.systems].sort((a,b)=>(a.sort_order||0)-(b.sort_order||0));
  const initial = React.useMemo(
    ()=>Object.fromEntries(systems.map(s=>[s.id,(s.countdown_hours||0)*3600])),
    [data.systems]
  );
  const [remaining, setRemaining] = useState(initial);
  const [running, setRunning] = useState(false);
  const [editing, setEditing] = useState(null);

  useEffect(()=>{ setRemaining(initial); setRunning(false); }, [initial]);
  useEffect(()=>{
    if (!running) return;
    const SPEED=3600, STEP=200; // 1 real second ≈ 1 story hour
    const id=setInterval(()=>{
      setRemaining(prev=>{
        const next={...prev};
        for (const k in next) next[k]=Math.max(0, next[k]-SPEED*(STEP/1000));
        return next;
      });
    }, STEP);
    return ()=>clearInterval(id);
  }, [running]);

  const charName = id => { const c=data.characters.find(x=>x.id===id); return c?c.name:null; };

  return (
    <>
      <div className="panel" style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:10}}>
        <div><span className="label">The Clock</span> &nbsp;
          <span className="dim">infrastructure failing in real time — lamps drive off the data</span></div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <button className="btn sm" onClick={()=>setRunning(r=>!r)}>{running?"❚❚ Pause":"▶ Run clock"}</button>
          <button className="btn sm" onClick={()=>{ setRunning(false); setRemaining(initial); }}>↺ Reset</button>
          <button className="btn sm" onClick={()=>setEditing({isNew:true})}>+ System</button>
        </div>
      </div>

      <div className="clock-grid">
        {systems.map(s=>{
          const rem = remaining[s.id] ?? (s.countdown_hours||0)*3600;
          const init = (s.countdown_hours||0)*3600 || 1;
          const pct = Math.max(0, Math.min(100, rem/init*100));
          const failed = rem<=0;
          return (
            <div className={"clock-tile"+(failed?" failed":"")} key={s.id}>
              <div className="ct-head">
                <span className={"lamp "+(failed?"red":(s.status||"green"))}></span>
                <span className="ct-name">{s.name}</span>
                <button className="copy-btn" onClick={()=>setEditing(s)}>Edit</button>
              </div>
              <div className={"ct-readout "+(failed?"r-red":"r-"+(s.status||"green"))}>
                {failed ? "— FAILED —" : hms(rem)}
              </div>
              <div className="ct-sub dim">{failed ? "window elapsed" : `T-minus · ${s.countdown_hours}h window`}</div>
              <div className="fuse"><div className={"fuse-fill f-"+(s.status||"green")} style={{width:pct+"%"}}></div></div>
              {s.assigned_character_id && <div className="ct-assigned">▸ {charName(s.assigned_character_id)||"unassigned"}</div>}
              {s.description && <div className="ct-desc">{s.description}</div>}
            </div>
          );
        })}
        {systems.length===0 && <div className="dim">No systems yet. Add one.</div>}
      </div>

      {editing && <SystemModal data={data} editing={editing} user={user}
        onClose={()=>setEditing(null)} onSaved={()=>{ setEditing(null); reload(); }} />}
    </>
  );
}

function SystemModal({ data, editing, user, onClose, onSaved }){
  const isNew = !!editing.isNew;
  const seed = isNew ? { name:"", countdown_hours:72, status:"amber", assigned_character_id:null, description:"" } : { ...editing };
  const [f,setF]=useState(seed);
  const [busy,setBusy]=useState(false);
  const set=(k,v)=>setF(s=>({...s,[k]:v}));

  const save = async ()=>{
    if (!f.name.trim()){ alert("Name the system."); return; }
    setBusy(true);
    const patch = { name:f.name, countdown_hours: f.countdown_hours?parseInt(f.countdown_hours):null,
      status:f.status, assigned_character_id:f.assigned_character_id||null, description:f.description };
    let id=f.id;
    if (isNew){
      const { data:rows, error } = await sb.from("LS_systems").insert(patch).select();
      if (error){ setBusy(false); alert("Save failed: "+error.message); return; }
      id = rows && rows[0] && rows[0].id;
    } else {
      const { error } = await sb.from("LS_systems").update(patch).eq("id", f.id);
      if (error){ setBusy(false); alert("Save failed: "+error.message); return; }
    }
    await logChange("system", id, user.email, `${isNew?"added":"edited"} system — ${f.name} (${f.status}, ${f.countdown_hours}h)`);
    setBusy(false); onSaved();
  };
  const del = async ()=>{
    if (!confirm(`Delete "${f.name}"?`)) return;
    const { error } = await sb.from("LS_systems").delete().eq("id", f.id);
    if (error){ alert("Delete failed: "+error.message); return; }
    await logChange("system", f.id, user.email, `deleted system — ${f.name}`);
    onSaved();
  };

  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:520}}>
        <div className="modal-head">
          <div className="label">{isNew?"New system":"Edit system"}</div>
          <button className="x" onClick={onClose}>ESC ✕</button>
        </div>
        <div className="modal-body">
          <div className="field"><label>Name</label>
            <input value={f.name||""} onChange={e=>set("name",e.target.value)} placeholder="e.g. Hoover Dam / Glen Canyon" /></div>
          <div className="row2">
            <div className="field"><label>Countdown window (hours)</label>
              <input type="number" value={f.countdown_hours||""} onChange={e=>set("countdown_hours",e.target.value)} /></div>
            <div className="field"><label>Status</label>
              <select value={f.status||"green"} onChange={e=>set("status",e.target.value)}>
                {CLOCK_STATUS.map(s=><option key={s} value={s}>{s}</option>)}
              </select></div>
          </div>
          <div className="field"><label>Assigned character (optional)</label>
            <select value={f.assigned_character_id||""} onChange={e=>set("assigned_character_id",e.target.value||null)}>
              <option value="">— unassigned —</option>
              {data.characters.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
            </select></div>
          <div className="field"><label>Description</label>
            <textarea rows={4} value={f.description||""} onChange={e=>set("description",e.target.value)} /></div>
          <div style={{display:"flex",alignItems:"center",gap:14}}>
            <button className="btn" style={{width:"auto"}} disabled={busy} onClick={save}>{busy?"Saving…":"Save system"}</button>
            {!isNew && <button className="del-btn" onClick={del}>Delete</button>}
          </div>
          <div className="dim" style={{fontSize:11,marginTop:10}}>Countdown + status also feed the Timeline's crisis deadlines and the Overview board.</div>
        </div>
      </div>
    </div>
  );
}

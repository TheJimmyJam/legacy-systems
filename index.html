function Antagonists({ data }) {
  const systems = [...data.systems].sort((a,b)=>(a.sort_order||0)-(b.sort_order||0));

  // Cascade Timer: lowest-hours active (non-green) system = next catastrophe
  const activeCrises = systems.filter(s => s.status !== 'green');
  const nextCrisis = activeCrises.length
    ? activeCrises.reduce((min,s)=>((s.countdown_hours||0)<(min.countdown_hours||0)?s:min), activeCrises[0])
    : null;

  return (
    <>
      {/* Three-Force Overview */}
      <div className="panel">
        <h2>Antagonist Forces — Three-Force Model</h2>
        <p className="dim" style={{marginBottom:16,fontSize:12,lineHeight:1.6}}>
          Three forces drive the central dramatic pressure of the film. The strongest scenes involve all three simultaneously — time, force, and authority pressing from every direction.
        </p>
        <div className="ant-force-grid">
          {ANT_FORCES.map(f=>(
            <div className="ant-card" key={f.id} style={{borderColor:f.color}}>
              <div className="ant-card-head">
                <span className="ant-id">{f.id}</span>
                <div>
                  <div className="ant-name" style={{color:f.color}}>{f.name}</div>
                  {f.full!==f.name && <div className="ant-fullname">{f.full}</div>}
                </div>
              </div>
              <div className="ant-type">{f.type}</div>
              <div className="ant-kv">
                <span className="ant-kv-label">Central question</span>
                <span className="ant-kv-val">"{f.question}"</span>
              </div>
              <div className="ant-kv">
                <span className="ant-kv-label">Pressure type</span>
                <span className="ant-kv-val" style={{color:f.color,fontStyle:"normal",fontFamily:"var(--display)",fontSize:13}}>{f.pressure}</span>
              </div>
              <p className="ant-desc" style={{marginTop:12}}>{f.description}</p>
              <div className="ant-section-head">Dramatic function</div>
              <p className="ant-desc">{f.dramatic}</p>
              <div className="ant-section-head">Theme</div>
              <p className="ant-desc">{f.theme}</p>
            </div>
          ))}
        </div>
      </div>

      {/* Cascade Timer */}
      <div className="panel">
        <h2>Cascade Timer — Infrastructure Threat Queue</h2>
        <p className="dim" style={{marginBottom:16,fontSize:12,lineHeight:1.6}}>
          The timer always displays time to the next unavoidable catastrophic threshold. When a crisis is resolved, it recalibrates to the next. Systems are managed in The Clock tab.
        </p>

        {nextCrisis ? (
          <div className="cascade-primary">
            <div className="cascade-label">CASCADE CLOCK — NEXT THRESHOLD</div>
            <div className="cascade-name">{nextCrisis.name}</div>
            <div className="cascade-hours">T− {nextCrisis.countdown_hours}h</div>
            <div className="cascade-sub">{nextCrisis.description || "No description — edit in The Clock tab."}</div>
          </div>
        ) : (
          <div className="dim" style={{marginBottom:20,padding:"12px 0"}}>No active crises. All systems green, or add systems in The Clock tab.</div>
        )}

        <div className="cascade-queue">
          {systems.map(s=>{
            const isNext = nextCrisis && s.id===nextCrisis.id;
            const resolved = s.status==="green";
            const critical = s.status==="red";
            return (
              <div className={"cascade-row"+(isNext?" cascade-row-active":"")} key={s.id}>
                <span className={"lamp "+(resolved?"green":critical?"red":"amber")}></span>
                <div style={{flex:1}}>
                  <div style={{color:"#dff0df",fontSize:13}}>{s.name}</div>
                  <div className="dim" style={{fontSize:10}}>
                    {resolved ? "Stable / resolved" : `Failure threshold: ${s.countdown_hours}h window`}
                  </div>
                </div>
                <div style={{textAlign:"right",fontSize:11,whiteSpace:"nowrap"}}>
                  {resolved
                    ? <span style={{color:"var(--green)"}}>RESOLVED</span>
                    : <span style={{color:critical?"var(--red)":"var(--amber)"}}>{s.countdown_hours}h</span>}
                </div>
              </div>
            );
          })}
          {systems.length===0 && <div className="dim" style={{padding:"12px 0"}}>No systems yet. Add them in The Clock tab.</div>}
        </div>

        <div className="dim" style={{marginTop:14,fontSize:11,lineHeight:1.6,borderTop:"1px solid var(--border)",paddingTop:12}}>
          Countdown logic: when Crisis A (72h) is resolved, the clock resets to the remaining gap before Crisis B. If Crisis B was originally 100h away, the new display shows 28h. The timer never feels arbitrary — every countdown is tied to a physical system with a clear failure threshold.
        </div>
      </div>

      {/* Combined Scene Example */}
      <div className="panel">
        <h2>Combined Force — Example Scene</h2>
        <div className="ant-example">
          <div className="ant-example-row">
            <span className="ant-ex-force" style={{color:"var(--red)"}}>THE CASCADE</span>
            <span>Timer shows a regional water system will fail in 19 hours.</span>
          </div>
          <div className="ant-example-row">
            <span className="ant-ex-force" style={{color:"var(--blue)"}}>THE SRU</span>
            <span>Refuses to authorize the detour — believes the modern supervisory control platform will restore within 12 hours.</span>
          </div>
          <div className="ant-example-row">
            <span className="ant-ex-force" style={{color:"var(--amber)"}}>THE SOVEREIGNS</span>

          <div style={{marginTop:12,paddingTop:12,borderTop:"1px solid var(--border)",fontSize:12,color:"var(--text-dim)",lineHeight:1.6}}>
            The Legacy team must now overcome <strong style={{color:"var(--red)"}}>time</strong>, <strong style={{color:"var(--blue)"}}>bureaucracy</strong>, and <strong style={{color:"var(--amber)"}}>armed opposition</strong> in the same sequence.
          </div>
        </div>
      </div>
    </>
  );
}

/* ============================ ACTIVITY (audit log) ============================ */
function Activity({ data }) {
  const notes = data.notes || [];
  const charById = Object.fromEntries(data.characters.map(c=>[c.id,c.name]));
  const sceneById = Object.fromEntries(data.scenes.map(s=>[s.id,s.title]));
  const entityName = (n)=>{
    if (n.entity_type==="character") return charById[n.entity_id] || "(removed)";
    if (n.entity_type==="scene")     return sceneById[n.entity_id] || "(deleted)";
    return "";
  };
  return (
    <div className="panel">
      <h2>Activity Log <span className="dim" style={{fontSize:11,letterSpacing:0,textTransform:"none"}}>· {notes.length} entries · append-only</span></h2>
      {notes.length===0 && <div className="dim">No changes logged yet. Edit a character or scene and it shows up here.</div>}
      <div className="audit">
        {notes.map(n=>(
          <div className="audit-row" key={n.id}>
            <span className="audit-when" title={new Date(n.created_at).toLocaleString()}>{timeAgo(n.created_at)}</span>
            <span className="audit-who">{shortName(n.author)}</span>
            <span className="audit-what">{n.body}
              {entityName(n) && <span className="audit-ent"> — {n.entity_type}: {entityName(n)}</span>}
            </span>
          </div>
        ))}
      </div>
    </div>
  );
}

      <p className="dim">This section lands in the next build phase. The data model is ready —

}

/* ============================ APP ============================ */
const TABS = [
  {id:"overview",    label:"Overview",    ready:true},
  {id:"characters",  label:"Characters",  ready:true},
  {id:"arcs",        label:"Arcs",        ready:true},
  {id:"timeline",    label:"Timeline",    ready:true},
  {id:"clock",       label:"The Clock",   ready:true},
  {id:"antagonists", label:"Antagonists", ready:true},
  {id:"connections", label:"Connections", ready:false},
  {id:"scenes",      label:"Scenes",      ready:true},
  {id:"themes",      label:"Themes",      ready:false},
  {id:"activity",    label:"Activity",    ready:true},
];

function readTheme(){
  try { return localStorage.getItem("ls_theme") || "dark"; } catch(e){ return "dark"; }
}

function App() {
  const [session, setSession] = useState(undefined); // undefined=loading
  const [tab, setTab] = useState("overview");
  const [data, setData] = useState(null);
  const [err, setErr] = useState("");
  const [theme, setTheme] = useState(readTheme);

  useEffect(()=>{
    document.documentElement.dataset.theme = theme;
    try { localStorage.setItem("ls_theme", theme); } catch(e){}
  }, [theme]);
  const toggleTheme = () => setTheme(t => t==="dark" ? "light" : "dark");

  useEffect(()=>{
    sb.auth.getSession().then(({data})=>setSession(data.session));
    const { data:sub } = sb.auth.onAuthStateChange((_e,s)=>setSession(s));
    return ()=>sub.subscription.unsubscribe();
  },[]);

  const load = useCallback(async ()=>{
    setErr("");
    const q = (t,order="sort_order")=>sb.from(t).select("*").order(order,{ascending:true});
    const notesQ = sb.from("LS_notes").select("*").order("created_at",{ascending:false}).limit(500);
    const [fac,ch,sys,sc,th,ar,ev,no] = await Promise.all([
      q("LS_factions","name"), q("LS_characters"), q("LS_systems"),
      q("LS_scenes"), q("LS_themes"), q("LS_character_arcs"), q("LS_timeline_events"), notesQ
    ]);
    const anyErr = [fac,ch,sys,sc,th,ar,ev,no].find(r=>r.error);
    if (anyErr) { setErr(anyErr.error.message); return; }
    setData({
      factions:fac.data, characters:ch.data, systems:sys.data,
      scenes:sc.data, themes:th.data, arcs:ar.data, events:ev.data, notes:no.data
    });
  },[]);

  useEffect(()=>{ if (session) load(); },[session, load]);

  useEffect(()=>{
    const esc = e => e.key==="Escape";
    return ()=>{};
  },[]);

  if (session === undefined)
    return <div className="loading">CONNECTING<span className="blinkcursor"></span></div>;
  if (!session) return <Login />;

  const user = session.user;

  return (
    <>
      <div className="topbar">
        <div className="brand">
          <h1>Legacy Systems</h1>
          <span className="sub">Writers' Room</span>
        </div>
        <div className="who">
          <button onClick={toggleTheme} title="Toggle light / dark">{theme==="dark" ? "☀ Light" : "☾ Dark"}</button>
          <button className="btn-export" onClick={()=>exportBible(data)} title="Export full story bible as .md for ChatGPT / Claude">⬇ Export Bible</button>
          <span>{user.email}</span>
          <button onClick={()=>sb.auth.signOut()}>Sign out</button>
        </div>
      </div>

      <div className="nav">
        {TABS.map(t=>(
          <button key={t.id}
            className={(tab===t.id?"active ":"")+(t.ready?"":"soon")}
            onClick={()=>t.ready && setTab(t.id)}>
            {t.label}{!t.ready && " ·"}
          </button>
        ))}
      </div>

      <div className="wrap">
        {err && <div className="msg err">DB error: {err}<br/>
          <span className="dim">Did you run schema.sql in the Supabase SQL editor?</span></div>}
        {!data && !err && <div className="loading">LOADING DISPATCH<span className="blinkcursor"></span></div>}
        {data && tab==="overview"   && <Overview data={data} />}
        {data && tab==="characters" && <Characters data={data} reload={load} user={user} />}
        {data && tab==="scenes"     && <Scenes data={data} reload={load} user={user} />}
        {data && tab==="arcs"       && <Arcs data={data} reload={load} user={user} />}
        {data && tab==="timeline"   && <Timeline data={data} reload={load} user={user} />}
        {data && tab==="clock"        && <Clock data={data} reload={load} user={user} />}
        {data && tab==="antagonists"  && <Antagonists data={data} />}
        {data && tab==="activity"     && <Activity data={data} />}
        {data && !["overview","characters","scenes","arcs","timeline","clock","antagonists","activity"].includes(tab) &&
          <ComingSoon name={TABS.find(t=>t.id===tab).label} />}
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
